# ローカル開発用の PostgreSQL + PostGIS(空のDBを起動するだけ)。
#   docker compose up -d      で起動
#   docker compose down       で停止(データは保持)
#   docker compose down -v    で停止＋データ削除
#
# 接続先: postgres://postgres:postgres@localhost:55432/washokumap
#
# スキーマの適用は docker の init ではなく **マイグレーションランナー**で行う(本番と同じ手順):
#   npm run db:up && npm run db:migrate   # 起動 → 0001.. を適用(冪等)
#   npm run db:seed                       # 任意: 動作確認用データ
#   npm run db:fresh                      # 作り直し(reset → migrate → seed)
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: washoku-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: washokumap
    ports:
      - "55432:5432"
    volumes:
      - washoku-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d washokumap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  washoku-db-data:
